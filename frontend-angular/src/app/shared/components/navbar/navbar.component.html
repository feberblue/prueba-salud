<nav class="bg-white shadow-md">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex items-center">
        <a routerLink="/" class="flex items-center space-x-2">
          <svg class="h-8 w-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
          </svg>
          <span class="text-xl font-bold text-gray-900">Sistema de Medicamentos</span>
        </a>
      </div>

      @if (authService.isAuthenticated()) {
        <div class="flex items-center space-x-4">
          <a routerLink="/solicitudes/nueva" 
             class="flex items-center space-x-2 bg-emerald-700 text-white px-3 py-2 rounded-md text-sm font-medium">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <span>Nueva Solicitud</span>
          </a>
          
          <a routerLink="/solicitudes" 
             class="px-4 py-2 text-sm font-medium text-gray-700 hover:text-gray-900 transition">
            Mis Solicitudes
          </a>

          <div class="flex items-center space-x-3 border-l pl-4">
            <span class="text-sm text-gray-700">{{ authService.currentUser()?.username }}</span>
            <button (click)="handleLogout()"
                    class="flex items-center space-x-2 text-gray-700 hover:bg-emerald-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition">
              <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />

              <span>Salir</span>

          </div>
        </div>
      }
    </div>
  </div>
</nav>
