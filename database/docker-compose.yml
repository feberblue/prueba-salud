version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: medicamentos-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: medicamentos_db
      MYSQL_USER: medicamentos_user
      MYSQL_PASSWORD: medicamentos_pass
    ports:
      - "3306:3306"
    volumes:
      # Mount SQL scripts to be executed on initialization
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      # Persist data
      - mysql_data:/var/lib/mysql
    networks:
      - medicamentos-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  medicamentos-network:
    driver: bridge
